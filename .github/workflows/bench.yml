name: Startup Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  deployments: write

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim (stable)
        run: |
          curl -fsSL -o /tmp/nvim.tar.gz \
            https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz
          sudo tar -C /opt -xzf /tmp/nvim.tar.gz
          sudo ln -sf /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim
          nvim --version | head -1

      - name: Install hyperfine + jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq hyperfine jq

      - name: Stage config under NVIM_APPNAME
        env:
          NVIM_APPNAME: BeastVim
        run: |
          mkdir -p "$HOME/.config/BeastVim"
          cp -r . "$HOME/.config/BeastVim/"

      - name: Prime config (install plugins headlessly)
        env:
          NVIM_APPNAME: BeastVim
        run: |
          timeout 300 nvim --headless "+Lazy! sync" +qa || true
          timeout 60  nvim --headless "+qa" || true

      - name: Run startup benchmark (warm)
        env:
          NVIM_APPNAME: BeastVim
        run: |
          chmod +x scripts/bench-startup.sh
          ./scripts/bench-startup.sh 20 warm BeastVim

      - name: Convert to benchmark-action format
        run: |
          chmod +x scripts/bench-to-benchmark-json.sh
          LATEST=$(ls -t "$HOME/.cache/beast-bench/"startup-BeastVim-warm-*.json | head -1)
          echo "Using: $LATEST"
          ./scripts/bench-to-benchmark-json.sh "$LATEST" "BeastVim startup (warm)" \
            > bench-result.json
          cat bench-result.json

      - name: Publish & compare
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: BeastVim Startup
          tool: customSmallerIsBetter
          output-file-path: bench-result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Push history to gh-pages only on main; PRs just comment a comparison.
          auto-push: ${{ github.event_name == 'push' }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          # Regression alerting (flag if any metric exceeds 115% of prev best).
          alert-threshold: '115%'
          fail-on-alert: false
          comment-on-alert: true
          summary-always: true
          alert-comment-cc-users: '@loctvl842'
